version: "3.9"

services:
  app:
    build: .
    container_name: control_asistencia_app
    ports:
      - "9001:80"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: apsystem
      DB_PASSWORD: apsystem
      DB_NAME: apsystem
    volumes:
      - .:/var/www/html

  db:
    image: mysql:5.7
    container_name: control_asistencia_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: apsystem
      MYSQL_USER: apsystem
      MYSQL_PASSWORD: apsystem
    volumes:
      - db_data:/var/lib/mysql
      - ./database/apsystem.sql:/docker-entrypoint-initdb.d/apsystem.sql:ro

volumes:
  db_data:

